<script>

const params = new URLSearchParams(window.location.search);
const submissionId = params.get("submission_id");

const sheetTranscript =
"https://opensheet.elk.sh/1Q_19DamqDI5sTmJwNZreqIapyiIL-LpYdlaR2tLPUUI/Sheet1";

const sheetAudio =
"https://opensheet.elk.sh/1R-Lfx-9yDN9o2Gk8tl3VhdlOOLQNo0YnTFBQN9zD3iw/Sheet1";

async function fetchResults(){

const status = document.getElementById("status");

try{

const [data1,data2] = await Promise.all([
fetch(sheetTranscript).then(r=>r.json()),
fetch(sheetAudio).then(r=>r.json())
]);

const allData = data1.concat(data2);

const result = allData.find(
row => row["Submission ID"] === submissionId
);

if(result){

document.getElementById("name").innerText =
(result["Name"] || "") + " " + (result["Name - Nachname"] || "");

document.getElementById("thema").innerText =
result["Thema"] || result["Thema der Präsentation"] || "";

const feedbackText =
result["KI Analyse und Feedback"] ||
result["KI-Analyse und Feedback"] ||
result["Feedback"] ||
"";

const formattedFeedback =
feedbackText.split("\n").map(p => `<p class="mb-4">${p}</p>`).join("");

document.getElementById("feedback").innerHTML = formattedFeedback;

setTimeout(() => {

document.getElementById("status").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");

},1200);

}else{

status.innerHTML = `
<div class="text-center space-y-4">
<span class="material-symbols-outlined text-primary text-5xl animate-spin">psychology</span>
<p class="text-on-surface/70">Analyse läuft noch... Seite wird automatisch aktualisiert.</p>
</div>
`;

setTimeout(fetchResults,5000);

}

}catch(error){

status.innerHTML = `
<div class="text-center text-error">
Fehler beim Laden der Analyse.
</div>
`;

}

}

fetchResults();

</script>
